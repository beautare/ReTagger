name: Release

# 直发渠道发布流水线：推送 vX.Y.Z tag 后自动
#   构建 arm64 / x86_64 两个 DMG（Developer ID 签名 + 公证）
#   → 生成自动 changelog 的 GitHub Release
#   → 按架构更新 gh-pages 上的 Sparkle appcast，客户端随即可自动更新。
# tag 由 scripts/release.sh 创建，版本号与 project.pbxproj 保持一致。

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  SPARKLE_VERSION: "2.9.4"
  MIN_OS: "12.4"

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 校验 tag 与工程版本一致
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PBXPROJ=ReTagger.xcodeproj/project.pbxproj
          PBX_VERSION=$(grep 'MARKETING_VERSION = ' "$PBXPROJ" | grep -v '= 1.0;' | head -1 | sed 's/.*= //;s/;.*//' | tr -d '[:space:]')
          BUILD_NUMBER=$(grep 'CURRENT_PROJECT_VERSION = ' "$PBXPROJ" | grep -v '= 1;' | head -1 | sed 's/.*= //;s/;.*//' | tr -d '[:space:]')
          if [ "$VERSION" != "$PBX_VERSION" ]; then
            echo "tag v${VERSION} 与 MARKETING_VERSION ${PBX_VERSION} 不一致，请先运行 scripts/release.sh" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: 导入 Developer ID 证书
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

      - name: 写入 App Store Connect API Key
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          echo -n "$APPLE_API_KEY_P8_BASE64" | base64 --decode -o "$RUNNER_TEMP/AuthKey.p8"

      - name: 下载 Sparkle 发行包（框架 + 签名工具）
        run: |
          mkdir -p "$RUNNER_TEMP/sparkle-dist"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            | tar -xJ -C "$RUNNER_TEMP/sparkle-dist"

      - name: 构建 arm64 DMG（签名 + 公证）
        env:
          ARCH: arm64
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          SPARKLE_DIST_DIR: ${{ runner.temp }}/sparkle-dist
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./scripts/package_direct.sh

      - name: 构建 x86_64 DMG（签名 + 公证）
        env:
          ARCH: x86_64
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          SPARKLE_DIST_DIR: ${{ runner.temp }}/sparkle-dist
          APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: ./scripts/package_direct.sh

      - name: 生成校验和
        run: shasum -a 256 dist/*.dmg | tee dist/checksums.txt

      - name: 创建 GitHub Release（自动生成 changelog）
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/checksums.txt
          generate_release_notes: true

      - name: 更新 appcast（按架构 Sparkle 签名）
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_NUMBER: ${{ steps.version.outputs.build_number }}
          RELEASE_NOTES_URL: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
        run: |
          SIGN_UPDATE="$RUNNER_TEMP/sparkle-dist/bin/sign_update"
          mkdir -p public
          # 载入 gh-pages 上的既有 appcast，保留历史版本条目
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          for ARCH in arm64 x86_64; do
            git show "origin/gh-pages:appcast-${ARCH}.xml" > "public/appcast-${ARCH}.xml" 2>/dev/null \
              || rm -f "public/appcast-${ARCH}.xml"

            DMG_PATH="dist/ReTagger-v${VERSION}-${ARCH}.dmg"
            RESULT=$(echo "$SPARKLE_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$DMG_PATH")
            echo "$ARCH: $RESULT"
            EDSIGNATURE=$(echo "$RESULT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')
            DMG_LENGTH=$(echo "$RESULT" | sed -n 's/.*length="\([^"]*\)".*/\1/p')

            APPCAST_PATH="public/appcast-${ARCH}.xml" \
            ARCH="$ARCH" \
            MIN_OS="$MIN_OS" \
            DMG_URL="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/ReTagger-v${VERSION}-${ARCH}.dmg" \
            EDSIGNATURE="$EDSIGNATURE" \
            DMG_LENGTH="$DMG_LENGTH" \
            ./scripts/update_appcast.sh
          done

      - name: 发布 appcast 到 gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: false
